<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Turkish Airlines Flight Globe | Ahmet Hamza Mülayim</title>
    <meta
      name="description"
      content="Every Turkish Airlines flight currently in the air, live on an interactive 3D globe. Real-time ADS-B data from the OpenSky Network."
    />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23e81932'/%3E%3Ctext x='32' y='45' font-size='38' font-family='sans-serif' font-weight='700' text-anchor='middle' fill='%23fff'%3EA%3C/text%3E%3C/svg%3E" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Live Turkish Airlines Flight Globe" />
    <meta property="og:description" content="Every airborne Turkish Airlines flight on an interactive 3D globe, from live ADS-B data." />
    <meta property="og:url" content="https://ahmethmzamlym.engineer/thy-globe.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        overflow: hidden;
        height: 100vh;
        height: 100dvh; /* mobile browser chrome */
      }
      #globe {
        position: fixed;
        inset: 0;
        z-index: 0;
      }
      .site-header {
        position: relative;
        z-index: 2;
      }
      .plane {
        pointer-events: auto;
        cursor: pointer;
        color: #e81932;
        filter: drop-shadow(0 0 3px rgba(0, 0, 0, 0.9));
        transition: opacity 300ms ease;
      }
      .plane.cargo { color: #4a90d9; }
      .plane.selected {
        color: #fff;
        filter: drop-shadow(0 0 6px rgba(232, 25, 50, 0.95));
      }
      .plane svg { display: block; }
      #tip {
        position: fixed;
        z-index: 5;
        pointer-events: none;
        display: none;
        background: rgba(38, 17, 22, 0.95);
        border: 1px solid rgba(233, 186, 196, 0.18);
        border-radius: 12px;
        padding: 8px 12px;
        font-size: 0.82rem;
        line-height: 1.5;
        color: var(--muted);
        max-width: 240px;
      }
      #tip b { color: var(--text); font-family: "Space Grotesk", sans-serif; }
      .globe-panel {
        position: fixed;
        left: 24px;
        bottom: 24px;
        z-index: 2;
        width: 264px;
        padding: 22px;
        background: var(--panel-strong);
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }
      .globe-panel .eyebrow { margin-bottom: 8px; }
      .big-count {
        font-family: "Space Grotesk", sans-serif;
        font-size: 3.4rem;
        line-height: 1;
        letter-spacing: -0.03em;
      }
      .big-count small {
        display: block;
        margin-top: 4px;
        font-family: "Manrope", sans-serif;
        font-size: 0.88rem;
        font-weight: 500;
        color: var(--muted);
        letter-spacing: 0;
      }
      .updated {
        margin: 10px 0 12px;
        font-size: 0.85rem;
        color: var(--muted);
      }
      .legend {
        display: flex;
        gap: 14px;
        margin: 0 0 12px;
        font-size: 0.8rem;
        color: var(--muted);
      }
      .legend i {
        display: inline-block;
        width: 9px;
        height: 9px;
        border-radius: 999px;
        margin-right: 6px;
      }
      .flight-search {
        width: 100%;
        min-height: 44px;
        padding: 0 16px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font: inherit;
        outline: none;
      }
      .flight-search:focus { border-color: var(--accent-2); }
      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 14px;
        font-size: 0.85rem;
        color: var(--muted);
      }
      .status-row .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #8a7a7e;
        flex: none;
        transition: background 300ms ease, box-shadow 300ms ease;
      }
      .status-row.ok .dot { background: #3fd68f; box-shadow: 0 0 12px rgba(63, 214, 143, 0.7); }
      .status-row.load .dot { background: var(--accent-2); box-shadow: 0 0 12px rgba(255, 125, 142, 0.6); }
      .status-row.err .dot { background: var(--accent); box-shadow: 0 0 12px rgba(232, 25, 50, 0.7); }
      .hint {
        margin-top: 12px;
        font-size: 0.78rem;
        color: var(--muted);
        opacity: 0.75;
      }
      .detail {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 3;
        width: 300px;
        padding: 20px 22px;
        background: var(--panel-strong);
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }
      .detail h3 {
        margin: 4px 0 2px;
        font-family: "Space Grotesk", sans-serif;
        font-size: 1.5rem;
        letter-spacing: -0.02em;
      }
      .detail .dmodel { margin: 0 0 12px; font-size: 0.9rem; color: var(--muted); }
      .detail .droute {
        padding: 12px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 0.9rem;
        line-height: 1.6;
        color: var(--muted);
      }
      .detail .droute b { color: var(--text); font-family: "Space Grotesk", sans-serif; }
      .detail .dstats {
        padding-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 0.85rem;
        color: var(--muted);
        line-height: 1.7;
      }
      .detail .dstats b { color: var(--text); }
      #dclose {
        position: absolute;
        top: 12px;
        right: 14px;
        background: none;
        border: 0;
        color: var(--muted);
        font-size: 1.3rem;
        cursor: pointer;
        line-height: 1;
      }
      #dclose:hover { color: var(--text); }
      @media (max-width: 900px) {
        .globe-panel {
          left: 12px;
          right: auto;
          bottom: 12px;
          width: 220px;
          padding: 16px;
        }
        .big-count { font-size: 2.4rem; }
        .detail {
          right: 12px;
          bottom: 12px;
          width: min(300px, calc(100vw - 260px));
          padding: 16px;
        }
      }
    </style>
    <script src="https://unpkg.com/globe.gl@2.46.1/dist/globe.gl.min.js"></script>
  </head>
  <body>
    <div class="noise"></div>
    <div id="globe"></div>
    <div id="tip"></div>

    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-mark">A</span>
        <span>
          <strong>Live THY flight globe</strong>
          <small>real-time ADS-B · OpenSky Network</small>
        </span>
      </a>
      <nav class="site-nav">
        <a class="button secondary" href="index.html#projects">← Back to portfolio</a>
      </nav>
    </header>

    <aside class="globe-panel">
      <p class="eyebrow">Turkish Airlines · live</p>
      <div class="big-count"><span id="count">–</span><small id="countlabel">aircraft airborne</small></div>
      <p class="updated" id="updated">waiting for first data…</p>
      <div class="legend">
        <span><i style="background: #e81932"></i>Passenger</span>
        <span><i style="background: #4a90d9"></i>Cargo</span>
      </div>
      <input class="flight-search" id="search" type="search" placeholder="Filter flight, e.g. 1951" aria-label="Filter by flight number" />
      <div class="status-row" id="statusrow"><span class="dot"></span><span id="statustext">connecting…</span></div>
      <p class="hint">Drag to rotate · scroll to zoom · click a plane for its route &amp; model</p>
    </aside>

    <aside class="detail" id="detail" hidden>
      <button id="dclose" aria-label="Close">×</button>
      <p class="eyebrow" id="dtag">Passenger</p>
      <h3 id="dcallsign"></h3>
      <p class="dmodel" id="dmodel">looking up aircraft…</p>
      <div class="droute" id="droute">looking up route…</div>
      <div class="dstats" id="dstats"></div>
    </aside>

    <script>
      // Deno Deploy proxy (thy-globe-proxy-deno.ts). For local dev against
      // node server.js, set to "" (same-origin /api/states).
      const API_BASE = "https://civil-nightingale-6719.ahmethamzamulayim-png.deno.net";
      const ADSBDB = "https://api.adsbdb.com/v0";

      const M_TO_FT = 3.28084, MS_TO_KT = 1.94384;
      const PLANE_SVG = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>';

      let planes = [];
      let selected = null; // callsign of selected plane

      // ponytail: Turkish Cargo = TK6xxx flight-number block; alphanumeric
      // cargo callsigns (THY6xx letter-suffixed) slip through as passenger.
      const isCargo = cs => { const n = parseInt((cs.match(/\d+/) || [""])[0], 10); return n >= 6000 && n <= 6999; };

      // --- adsbdb lookups, cached in localStorage (airframes are static) ---
      const store = k => { try { return JSON.parse(localStorage.getItem(k)) || {}; } catch { return {}; } };
      const AC = store("thy_ac");   // hex -> {model, reg, t} | null (known-unknown)
      // routes change seasonally: discard the route cache when the month rolls over
      const MONTH = new Date().toISOString().slice(0, 7);
      const rtRaw = store("thy_rt");
      const RT = rtRaw.m === MONTH ? rtRaw.d : {}; // callsign -> {oi,on,om,di,dn,dm,olat,olng,dlat,dlng} | null
      const save = () => { try { localStorage.setItem("thy_ac", JSON.stringify(AC)); localStorage.setItem("thy_rt", JSON.stringify({ m: MONTH, d: RT })); } catch {} };

      async function getAircraft(hex) {
        if (AC[hex] !== undefined) return AC[hex];
        try {
          const j = await (await fetch(`${ADSBDB}/aircraft/${hex}`)).json();
          const a = j.response && j.response.aircraft;
          AC[hex] = a ? { model: `${a.manufacturer} ${a.type}`, reg: a.registration, t: a.icao_type || "" } : null;
          save();
          return AC[hex];
        } catch { return null; } // network error: not cached, retried later
      }

      async function getRoute(cs) {
        if (RT[cs] !== undefined) return RT[cs];
        try {
          const j = await (await fetch(`${ADSBDB}/callsign/${cs}`)).json();
          const f = j.response && j.response.flightroute;
          RT[cs] = f && f.origin && f.destination ? {
            oi: f.origin.iata_code, on: f.origin.name, om: f.origin.municipality,
            di: f.destination.iata_code, dn: f.destination.name, dm: f.destination.municipality,
            olat: f.origin.latitude, olng: f.origin.longitude,
            dlat: f.destination.latitude, dlng: f.destination.longitude,
          } : null;
          save();
          return RT[cs];
        } catch { return null; }
      }

      // icon size (px) from airframe class; unknown types get the middle size
      function sizeFor(p) {
        const t = (AC[p.hex] || {}).t || "";
        if (/^(A33|A34|A35|B74|B76|B77|B78)/.test(t)) return 30; // wide-body
        if (/^(A31|A32|B72|B73|E1|E2|C91)/.test(t)) return 20;   // narrow-body
        return t ? 16 : 20;
      }

      // --- globe ---
      const globe = Globe()(document.getElementById("globe"))
        .globeImageUrl(null)
        .backgroundColor("rgba(0,0,0,0)")
        .showAtmosphere(true)
        .atmosphereColor("#e81932")
        .atmosphereAltitude(0.18)
        .polygonCapColor(f => (f.properties.ADM0_A3 === "TUR" ? "rgba(232,25,50,0.30)" : "rgba(48,26,32,0.85)"))
        .polygonSideColor(() => "rgba(0,0,0,0)")
        .polygonStrokeColor(() => "rgba(233,186,196,0.30)")
        .polygonAltitude(0.006)
        .polygonsTransitionDuration(0)
        .htmlLat("lat").htmlLng("lng").htmlAltitude(0.01)
        .htmlElement(p => {
          const el = document.createElement("div");
          el.className = "plane" + (p.cargo ? " cargo" : "") + (p.callsign === selected ? " selected" : "");
          el.innerHTML = PLANE_SVG;
          const s = sizeFor(p);
          el.firstChild.setAttribute("width", s);
          el.firstChild.setAttribute("height", s);
          el.firstChild.style.transform = `rotate(${p.hdg}deg)`;
          el.tabIndex = 0;
          el.setAttribute("role", "button");
          el.setAttribute("aria-label", `Flight ${p.callsign}`);
          el.onclick = e => { e.stopPropagation(); select(p); };
          el.onkeydown = e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); select(p); } };
          // planes swallow wheel events; re-dispatch to the canvas so zoom works over them
          el.onwheel = e => { e.preventDefault(); globe.renderer().domElement.dispatchEvent(new WheelEvent(e.type, e)); };
          el.onmouseenter = e => showTip(p, e);
          el.onmousemove = e => moveTip(e);
          el.onmouseleave = hideTip;
          return el;
        })
        .arcColor(() => "#ff7d8e")
        .arcStroke(0.5)
        .arcAltitudeAutoScale(0.4)
        .arcDashLength(0.5)
        .arcDashGap(0.2)
        .arcDashAnimateTime(1600)
        .labelColor(() => "#ff7d8e")
        .labelSize(1.1)
        .labelDotRadius(0.35)
        .labelText("text");

      globe.globeMaterial().color.set("#12080b");
      if (globe.htmlElementVisibilityModifier) {
        globe.htmlElementVisibilityModifier((el, visible) => { el.style.opacity = visible ? 1 : 0; el.style.pointerEvents = visible ? "auto" : "none"; });
      }

      fetch("countries-110m.geojson")
        .then(r => r.json())
        .then(geo => globe.polygonsData(geo.features));

      // slow auto-rotate; pauses while dragging, resumes after 10s idle;
      // stays off entirely for reduced-motion users
      const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
      const controls = globe.controls();
      controls.autoRotate = !reduceMotion;
      controls.autoRotateSpeed = 0.4;
      let idleT;
      controls.addEventListener("start", () => { controls.autoRotate = false; clearTimeout(idleT); });
      controls.addEventListener("end", () => {
        if (!reduceMotion) idleT = setTimeout(() => (controls.autoRotate = true), 10000);
      });
      globe.pointOfView({ lat: 41, lng: 29, altitude: 1.9 }); // start over Istanbul

      // --- tooltip ---
      const $ = id => document.getElementById(id);
      const tip = $("tip");
      function showTip(p, e) {
        const ac = AC[p.hex];
        tip.innerHTML = `<b>${p.callsign}</b> · ${p.cargo ? "Cargo" : "Passenger"}<br>` +
          (ac ? `${ac.model}<br>` : "") +
          `${Math.round(p.alt_m * M_TO_FT).toLocaleString()} ft · ${Math.round(p.spd_ms * MS_TO_KT)} kts`;
        tip.style.display = "block";
        moveTip(e);
      }
      function moveTip(e) { tip.style.left = e.clientX + 14 + "px"; tip.style.top = e.clientY + 14 + "px"; }
      function hideTip() { tip.style.display = "none"; }

      // --- selection / detail card ---
      async function select(p) {
        selected = p.callsign;
        render();
        globe.pointOfView({ lat: p.lat, lng: p.lng, altitude: 0.7 }, 1000);
        $("detail").hidden = false;
        $("dtag").textContent = p.cargo ? "Cargo" : "Passenger";
        $("dcallsign").textContent = p.callsign;
        $("dmodel").textContent = "looking up aircraft…";
        $("droute").textContent = "looking up route…";
        updStats(p);
        globe.arcsData([]); globe.labelsData([]);

        getAircraft(p.hex).then(ac => {
          if (selected !== p.callsign) return;
          $("dmodel").textContent = ac ? `${ac.model} · ${ac.reg}` : "Aircraft not in database";
          render(); // size may have changed now that the type is known
        });
        getRoute(p.callsign).then(rt => {
          if (selected !== p.callsign) return;
          if (!rt) { $("droute").textContent = "Route not in database (common for letter-suffix callsigns)"; return; }
          $("droute").innerHTML = `<b>${rt.oi}</b> ${rt.om || rt.on} <br>→ <b>${rt.di}</b> ${rt.dm || rt.dn}`;
          globe.arcsData([{ startLat: rt.olat, startLng: rt.olng, endLat: rt.dlat, endLng: rt.dlng }]);
          globe.labelsData([
            { lat: rt.olat, lng: rt.olng, text: rt.oi },
            { lat: rt.dlat, lng: rt.dlng, text: rt.di },
          ]);
        });
      }
      function updStats(p) {
        $("dstats").innerHTML =
          `Altitude <b>${Math.round(p.alt_m * M_TO_FT).toLocaleString()} ft</b><br>` +
          `Speed <b>${Math.round(p.spd_ms * MS_TO_KT)} kts</b> · Heading <b>${Math.round(p.hdg)}°</b>`;
      }
      function deselect() {
        selected = null;
        $("detail").hidden = true;
        globe.arcsData([]); globe.labelsData([]);
        render();
      }
      $("dclose").onclick = deselect;

      // --- data + render ---
      function setStatus(cls, text) {
        $("statusrow").className = "status-row " + cls;
        $("statustext").textContent = text;
      }

      function render() {
        const q = $("search").value.trim().toUpperCase();
        const shown = q
          ? planes.filter(p => p.callsign.includes(q) || p.callsign.replace("THY", "TK").includes(q))
          : planes;
        globe.htmlElementsData(shown);
        $("count").textContent = planes.length;
        $("countlabel").textContent = q ? `airborne · ${shown.length} match filter` : "aircraft airborne";
      }
      $("search").addEventListener("input", render);

      async function poll() {
        setStatus("load", "updating…");
        try {
          const res = await fetch(API_BASE + "/api/states");
          if (res.status === 429) { setStatus("err", "rate limited — retrying"); return; }
          if (!res.ok) { setStatus("err", `API error ${res.status}`); return; }
          const data = await res.json();
          planes = (data.states || [])
            .filter(s => s[1] && s[1].trim().startsWith("THY") && !s[8] && s[5] != null && s[6] != null)
            .map(s => ({
              hex: s[0], callsign: s[1].trim(), lng: s[5], lat: s[6],
              alt_m: s[13] ?? s[7] ?? 0, spd_ms: s[9] ?? 0, hdg: s[10] ?? 0,
              cargo: isCargo(s[1]),
            }));
          render();
          $("updated").textContent = "updated " + new Date().toLocaleTimeString();
          setStatus("ok", "live · OpenSky Network");
          const sel = planes.find(p => p.callsign === selected);
          if (sel) updStats(sel);
          // fill in airframe types a few at a time so icon sizes converge
          const unknown = planes.filter(p => AC[p.hex] === undefined).slice(0, 4);
          if (unknown.length) Promise.all(unknown.map(p => getAircraft(p.hex))).then(render);
        } catch {
          setStatus("err", "network error — retrying");
        }
      }
      poll();
      setInterval(poll, 15000);
    </script>
  </body>
</html>
